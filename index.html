<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Might As Well | 既然來了，就綻放吧</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Noto+Sans+TC:wght@300;500&display=swap');

        :root {
            --primary-bg: #0f172a;
            --accent-color: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--accent-color);
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('might_as_well_inspiration_1777976557574.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) saturate(1.2);
            z-index: -1;
            border-radius: 40px;
            transition: transform 10s ease;
        }

        .container:hover .background-image {
            transform: scale(1.1);
        }

        .content-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 4rem 3rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.quote {
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 2rem;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #f97316;
            margin: 0 auto 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            p.quote { font-size: 1.1rem; }
            .content-card { padding: 2.5rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="background-image"></div>
        
        <div class="content-card">
            <div class="divider"></div>
            <h1>Might as well</h1>
            <p class="quote">
                既然生活已經把我們推到了這裡，<br>
                不如就順著風，綻放出最燦爛的自己。
            </p>
            <p style="font-size: 0.9rem; color: #64748b; letter-spacing: 2px; text-transform: uppercase;">
                Embrace the moment
            </p>
        </div>
    </div>

</body>
</html>
